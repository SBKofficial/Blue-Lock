user:
  name: "SBKofficial"
  github: "SBKofficial"

runtime:
  image: "python:3.11-slim"

commands:
  build:
    - "pip install --no-cache-dir -r requirements.txt"
  start: "python run_bot.py"

repository:
  branch: "main"
  auto_deploy: true

environment:
  - BOT_TOKEN=${BOT_TOKEN}
  - ADMIN_IDS=${ADMIN_IDS}
  - MONGODB_URI=${MONGODB_URI}
  # add any other env vars from your .env here
